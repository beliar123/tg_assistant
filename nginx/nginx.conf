# HTTP — только редирект на HTTPS и выдача сертификата Let's Encrypt
server {
    listen 80;
    server_name remind.beliar.ru;

    # ACME challenge для Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name remind.beliar.ru;

    ssl_certificate     /etc/letsencrypt/live/remind.beliar.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remind.beliar.ru/privkey.pem;

    # Modern SSL config (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    root  /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'"
        always;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to API (strips /api/ prefix)
    # Docker DNS resolver — re-resolves upstream IP after container rebuilds.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        # Handle CORS preflight in nginx — FastAPI returns 400 on OPTIONS
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Max-Age       3600 always;
            add_header Content-Length               0;
            return 204;
        }

        set $upstream_path $request_uri;
        if ($request_uri ~ ^/api/(.*)$) {
            set $upstream_path /$1;
        }

        set $api_upstream http://api:8000;
        proxy_pass       $api_upstream$upstream_path;

        add_header Access-Control-Allow-Origin $http_origin always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
