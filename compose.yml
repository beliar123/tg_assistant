services:
  postgres:
    image: postgres:16-alpine3.20
    environment:
      POSTGRES_DB: ${DATABASE__POSTGRES_DB}
      POSTGRES_USER: ${DATABASE__POSTGRES_USER}
      POSTGRES_PASSWORD: ${DATABASE__POSTGRES_PASSWORD}
      PGDATA: "/var/lib/postgresql/data/pgdata"
      TZ: "Europe/Moscow"
    restart: "unless-stopped"
    volumes:
      - tg-assistant-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__POSTGRES_USER} -d ${DATABASE__POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.2-alpine3.21
    command: redis-server --requirepass ${REDIS__PASSWORD}
    restart: "unless-stopped"
    environment:
      TZ: "Europe/Moscow"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS__PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reminder:
    build:
      context: .
      dockerfile: scheduler.dockerfile
    command: sh ./schedule_entrypoint.sh
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: "unless-stopped"

  api:
    build:
      context: .
      dockerfile: api.dockerfile
    command: sh ./api_entrypoint.sh
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "unless-stopped"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: "unless-stopped"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: "unless-stopped"

volumes:
  tg-assistant-data:
  redis-data:
  certbot-www:
  certbot-certs:
