server {
    listen 80;
    server_name remind.beliar.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name remind.beliar.ru;

    ssl_certificate     /etc/letsencrypt/live/remind.beliar.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remind.beliar.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /home/remin/tg_assistant/frontend;
    index index.html;

    # Статика
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy к API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
