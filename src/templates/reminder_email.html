<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f4f4f4; font-family: Arial, sans-serif; }
    .wrapper { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #2AABEE; padding: 28px 32px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 22px; letter-spacing: 0.5px; }
    .body { padding: 32px; }
    .description { font-size: 18px; color: #1a1a1a; line-height: 1.5; margin: 0 0 24px; }
    .footer { background: #f9f9f9; padding: 16px 32px; text-align: center; color: #999; font-size: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>🔔 Напоминание</h1>
    </div>
    <div class="body">
      <p class="description">{{ description }}</p>
    </div>
    <div class="footer">
      Это автоматическое напоминание от Telegram-бота.
    </div>
  </div>
</body>
</html>
